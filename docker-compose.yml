version: "3.9"

services:
    laravel_app:
        build:
            context: .
            dockerfile: docker/Dockerfile.app
        container_name: laravel_app
        volumes:
            - .:/var/www/laravel_app
            - ./public:/var/www/laravel_app/public
            - ./storage:/var/www/laravel_app/storage
            - ./bootstrap/cache:/var/www/laravel_app/bootstrap/cache
        ports:
            - "9000:9000"
        depends_on:
            - laravel_redis
        networks:
            - laravel_network

    laravel_nginx:
        build:
            context: .
            dockerfile: docker/Dockerfile.nginx
        container_name: laravel_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/laravel_app
            - ./public:/var/www/laravel_app/public
            - ./storage:/var/www/laravel_app/storage
            - ./bootstrap/cache:/var/www/laravel_app/bootstrap/cache
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - laravel_app
        networks:
            - laravel_network

    laravel_redis:
        image: redis:7
        container_name: laravel_redis
        ports:
            - "6379:6379"
        volumes:
            - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
        networks:
            - laravel_network

